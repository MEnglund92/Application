version: '3.8'

services:
  backend:
    build: ./backend
    container_name: gemini_backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
    volumes:
      - ./backend:/app
    networks:
      - rag_network
    depends_on:
      - chromadb

  frontend:
    build: ./frontend
    container_name: gemini_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - rag_network
    environment:
      - CHOKIDAR_USEPOLLING=true

  chromadb:
    image: chromadb/chroma:0.4.22
    container_name: gemini_db
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - rag_network
    environment:
      - IS_PERSISTENT=TRUE

networks:
  rag_network:
    driver: bridge

volumes:
  chroma_data: