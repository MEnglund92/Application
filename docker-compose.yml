version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      # ChromaDB data persistence
      - ./backend/data:/app/data
      # Logs persistence
      - ./backend/logs:/app/logs
      # Source code for development
      - ./backend/app:/app/app
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/data/chroma
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    networks:
      - rag-network

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./docker/ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

# REMOVE the volumes section entirely - it's causing conflicts
